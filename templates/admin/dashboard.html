{% extends "admin/base.html" %}

{% block admin_title %}仪表盘{% endblock %}
{% block admin_header %}📊 仪表盘{% endblock %}

{% block admin_content %}
<div class="dashboard-stats">
    <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-info">
            <h3>{{ user_count }}</h3>
            <p>注册用户</p>
        </div>
    </div>
    
    <div class="stat-card">
        <div class="stat-icon">📝</div>
        <div class="stat-info">
            <h3>{{ post_count }}</h3>
            <p>文章总数</p>
        </div>
    </div>
    
    <div class="stat-card">
        <div class="stat-icon">🔥</div>
        <div class="stat-info">
            <h3>0</h3>
            <p>今日访问</p>
        </div>
    </div>
    
    <div class="stat-card">
        <div class="stat-icon">💬</div>
        <div class="stat-info">
            <h3>0</h3>
            <p>评论总数</p>
        </div>
    </div>
</div>

<div class="quick-actions">
    <h2>快速操作</h2>
    <div class="action-grid">
        <a href="{{ url_for('admin_users') }}" class="action-card">
            <span class="action-icon">👥</span>
            <span>管理用户</span>
        </a>
        <a href="{{ url_for('admin_posts') }}" class="action-card">
            <span class="action-icon">📝</span>
            <span>管理文章</span>
        </a>
        <a href="{{ url_for('admin_footer_links') }}" class="action-card">
            <span class="action-icon">🔗</span>
            <span>配置导航</span>
        </a>
        <a href="{{ url_for('create_post') }}" class="action-card">
            <span class="action-icon">✍️</span>
            <span>写文章</span>
        </a>
    </div>
</div>

<style>
.dashboard-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
}

.stat-card {
    background: rgba(255, 255, 255, 0.08);
    padding: 25px;
    border-radius: 15px;
    display: flex;
    align-items: center;
    gap: 20px;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.stat-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
}

.stat-icon {
    font-size: 3rem;
    opacity: 0.8;
}

.stat-info h3 {
    color: #fff;
    font-size: 2rem;
    margin: 0;
    font-weight: 700;
}

.stat-info p {
    color: rgba(255, 255, 255, 0.6);
    margin: 5px 0 0 0;
    font-size: 0.9rem;
}

.quick-actions {
    margin-top: 40px;
}

.quick-actions h2 {
    color: #fff;
    margin-bottom: 20px;
}

.action-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
}

.action-card {
    background: rgba(255, 255, 255, 0.05);
    padding: 25px;
    border-radius: 12px;
    text-align: center;
    text-decoration: none;
    color: #fff;
    transition: all 0.3s ease;
    border: 1px solid rgba(255, 255, 255, 0.1);
}

.action-card:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.3);
    transform: translateY(-3px);
}

.action-icon {
    font-size: 2.5rem;
    display: block;
    margin-bottom: 10px;
}
</style>
{% endblock %}
