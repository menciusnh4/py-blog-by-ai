{% extends "admin/base.html" %}

{% block admin_title %}仪表盘{% endblock %}
{% block admin_header %}📊 仪表盘{% endblock %}

{% block admin_content %}
<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-number">{{ user_count }}</div>
        <div class="stat-label">注册用户</div>
    </div>
    
    <div class="stat-card">
        <div class="stat-number">{{ post_count }}</div>
        <div class="stat-label">文章总数</div>
    </div>
    
    <div class="stat-card">
        <div class="stat-number">0</div>
        <div class="stat-label">今日访问</div>
    </div>
    
    <div class="stat-card">
        <div class="stat-number">0</div>
        <div class="stat-label">评论总数</div>
    </div>
</div>

<div class="quick-actions-section">
    <h3 style="margin-bottom: 20px; color: #2c3e50;">快速操作</h3>
    <div class="action-buttons">
        <a href="{{ url_for('admin_users') }}" class="btn btn-primary">
            👥 管理用户
        </a>
        <a href="{{ url_for('admin_posts') }}" class="btn btn-primary">
            📝 管理文章
        </a>
        <a href="{{ url_for('admin_footer_links') }}" class="btn btn-primary">
            🔗 配置导航
        </a>
        <a href="{{ url_for('create_post') }}" class="btn btn-success">
            ✍️ 写文章
        </a>
    </div>
</div>

<style>
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
}

.stat-card {
    background: #fff;
    padding: 25px;
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    text-align: center;
}

.stat-number {
    font-size: 2.5rem;
    font-weight: 700;
    color: #3498db;
    margin-bottom: 10px;
}

.stat-label {
    color: #7f8c8d;
    font-size: 0.95rem;
}

.quick-actions-section {
    margin-top: 30px;
}

.action-buttons {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.btn {
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    text-decoration: none;
    display: inline-block;
    cursor: pointer;
    font-size: 0.95rem;
    transition: all 0.2s;
}

.btn-primary {
    background: #3498db;
    color: #fff;
}

.btn-primary:hover {
    background: #2980b9;
}

.btn-success {
    background: #27ae60;
    color: #fff;
}

.btn-success:hover {
    background: #229954;
}

.btn-sm {
    padding: 6px 12px;
    font-size: 0.85rem;
}
</style>
{% endblock %}
