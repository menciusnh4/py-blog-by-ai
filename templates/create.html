{% extends "base.html" %}

{% block title %}创作中心 - 极客博客{% endblock %}

{% block content %}
<div class="form-container">
    <h2>✨ 创作新文章</h2>
    
    <form method="POST" class="post-form">
        <div class="form-group">
            <label for="title">📝 文章标题</label>
            <input type="text" id="title" name="title" required placeholder="输入一个吸引人的标题...">
            <div class="title-counter" style="text-align: right; font-size: 0.8rem; color: rgba(255,255,255,0.6); margin-top: 5px;">
                <span id="title-length">0</span>/100 字符
            </div>
        </div>
        
        <div class="form-group">
            <label for="author">✍️ 作者昵称</label>
            <input type="text" id="author" name="author" placeholder="想用什么名字？" value="极客">
        </div>
        
        <div class="form-group">
            <label for="content">⌨️ 文章内容</label>
            <div id="editor-container" style="border-radius: 15px; overflow: hidden;">
                <div id="quill-editor" style="height: 500px;"></div>
                <textarea id="content" name="content" style="display: none;"></textarea>
            </div>
            <div style="display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.8rem; color: rgba(255,255,255,0.6);">
                <div>
                    🔤 <span id="word-count">0</span> 字 |
                    <span id="char-count">0</span> 字符
                </div>
                <div>
                    预估阅读时长: <span id="read-time">0</span> 分钟
                </div>
            </div>
        </div>
        
        <div class="form-actions">
            <button type="submit" class="btn">
                ✈️ 发布文章
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">
                ❌ 取消
            </a>
        </div>
    </form>
</div>

<!-- Quill.js 富文本编辑器 -->
<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

<script>
// 初始化Quill编辑器
let quill;

// 等待DOM加载完成后初始化
document.addEventListener('DOMContentLoaded', function() {
    quill = new Quill('#quill-editor', {
        modules: {
            toolbar: [
                [{ 'header': [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ 'color': [] }, { 'background': [] }],
                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                [{ 'align': [] }],
                ['link', 'image', 'video'],
                ['clean']
            ]
        },
        placeholder: '开始你的创作之旅吧...让文字飞舞起来！',
        theme: 'snow'
    });

    // 自定义样式以匹配主题
    const toolbar = quill.container.parentNode.querySelector('.ql-toolbar');
    if (toolbar) {
        toolbar.style.borderRadius = '15px 15px 0 0';
        toolbar.style.borderBottom = '1px solid rgba(255,255,255,0.1)';
        toolbar.style.background = 'rgba(26, 26, 46, 0.8)';
    }

    const editor = quill.container.parentNode.querySelector('.ql-editor');
    if (editor) {
        editor.style.minHeight = '450px';
        editor.style.background = '#1a1a2e';
        editor.style.color = '#ffffff';
        editor.style.fontFamily = "'Segoe UI', Tahoma, Geneva, Verdana, sans-serif";
    }

    // 监听内容变化
    quill.on('text-change', function() {
        updateCounts();
        // 同步内容到隐藏的textarea
        document.getElementById('content').value = quill.root.innerHTML;
    });

    // 初始化字数统计
    updateCounts();
});

// 实时字数统计
const titleInput = document.getElementById('title');
const titleLength = document.getElementById('title-length');
const wordCount = document.getElementById('word-count');
const charCount = document.getElementById('char-count');
const readTime = document.getElementById('read-time');

function updateCounts() {
    // 标题统计
    const titleText = titleInput.value;
    titleLength.textContent = titleText.length;
    titleLength.style.color = titleText.length > 80 ? '#ff4757' : 'rgba(255,255,255,0.6)';
    
    // 内容统计（从Quill编辑器获取纯文本）
    let contentText = '';
    if (quill) {
        contentText = quill.getText();
    } else {
        // 如果编辑器还未初始化，使用原始textarea
        const contentTextarea = document.getElementById('content');
        contentText = contentTextarea ? contentTextarea.value : '';
    }
    
    const words = contentText.trim() ? contentText.trim().split(/\s+/).length : 0;
    const chars = contentText.length;
    
    wordCount.textContent = words;
    charCount.textContent = chars;
    readTime.textContent = Math.ceil(chars / 300);
}

// 监听输入事件
titleInput.addEventListener('input', updateCounts);

// 添加创作激励语
const encouragementPhrases = [
    "💡 灵感如泉涌，继续写下去！",
    "🚀 你的想法很棒，别停下来！",
    "🎯 每个字符都在改变世界！",
    "🔥 创作的热情正在燃烧！",
    "🌟 你正在创造独一无二的内容！"
];

setInterval(() => {
    if (quill && quill.getLength() > 50) {
        const randomPhrase = encouragementPhrases[Math.floor(Math.random() * encouragementPhrases.length)];
        console.log('%c' + randomPhrase, 'color: #4ecdc4; font-size: 14px; font-weight: bold;');
    }
}, 30000);

// 表单提交前的炫酷效果
document.querySelector('form').addEventListener('submit', function(e) {
    const submitBtn = this.querySelector('button[type="submit"]');
    submitBtn.innerHTML = '⏳ 发布中...';
    submitBtn.disabled = true;
    
    // 添加发布动画
    document.body.style.animation = 'pulse 0.5s ease';
    setTimeout(() => {
        document.body.style.animation = '';
    }, 500);
});
</script>

<style>
@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.02); }
    100% { transform: scale(1); }
}
</style>
{% endblock %}
